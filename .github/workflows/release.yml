name: build desktop app

# Build the Tauri desktop app for macOS (arm64 + x64), Windows, and Linux.
# Triggered by pushing a version tag (v*) or manually. Artifacts are attached
# to a GitHub Release. Code-signing is applied only when the matching secrets
# are present (otherwise the build is unsigned).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14 # Apple Silicon (arm64)
            args: "--target aarch64-apple-darwin"
          - platform: macos-13 # Intel (x64)
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust (matches src-tauri/rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-14' && 'aarch64-apple-darwin' || matrix.platform == 'macos-13' && 'x86_64-apple-darwin' || '' }}

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - run: npm ci

      # build:sidecar (run by tauri beforeBuildCommand) bundles the Next.js
      # standalone server + this runner's Node binary as the sidecar.
      - name: Build app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS signing + notarization (optional — only if secrets are set)
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || format('app-v__VERSION__') }}
          releaseName: "리디 드릴러 v__VERSION__"
          releaseBody: "See CHANGELOG. 미서명 빌드는 첫 실행 시 Gatekeeper/SmartScreen 우회가 필요할 수 있습니다."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
